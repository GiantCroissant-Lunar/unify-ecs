# Cross-CLI deployment via the open Agent Skills spec.
#
# Populates .agents/skills/ (read by Codex, Copilot, Kimi, OpenCode, Kilo
# natively, plus Claude Code via the Agent Skills compat) and AGENTS.md
# (read natively by Codex, Copilot, OpenCode, Kilo, plus Claude via the
# CLAUDE.md import shim).
# Qwen Code reads .qwen/skills/ via its own adapter; see ../qwen/config.yaml.
# Pi is intentionally not an active adapter.

tool: agents
display_name: Cross-CLI (.agents/ standard)

skills:
  target: .agents/skills
  strategy: symlink
  local: []
  workspace:
    - 00-meta/autoloop
    - 00-meta/check-before-claim
    - 00-meta/context-discovery
    - 00-meta/implementation-review
    - 00-meta/rfc-orchestrator
    - 00-meta/rfc-review
    - 00-meta/skill-creator
    - 00-meta/validation-guard
    - 04-tooling/build
    - 04-tooling/commit
    - 04-tooling/external-agent-delegation
    - 04-tooling/mcp-troubleshooter
    - 04-tooling/nuget-restore
    - 04-tooling/repomix
    - 04-tooling/unify-build
    - 04-tooling/vendor-patches
    - 04-tooling/vendor-restore

rules:
  target: AGENTS.md
  strategy: concatenate
  local: []
  workspace:
    - audit-existing-surfaces
    - build-conventions
    - commit-often
    - consult-skills-before-claiming
    - never-delete-repos
    - respect-other-agents-git-index
    - shared-native-deps
    - verify-godot-export
    - write-changes-inside-the-active-project

mcp:
  enabled: false

hooks:
  enabled: false
